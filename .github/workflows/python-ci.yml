name: Python CI (pytest)

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "HW3- CSC310/pytest-demo/requirements.txt"

      - name: Run tests
        working-directory: "HW3- CSC310/pytest-demo"
        run: python -m pytest